# ---------------------------------------------------------------------------
# Ansible inventory for OpenTelemetry Collector agents (VMs) and K8s clusters.
# Copy to inventory.local.ini and customize; do not commit real hostnames/IPs.
# See observability/PLACEHOLDERS.md and observability/RUNBOOK.md.
# ---------------------------------------------------------------------------

[agents]
# Example VM agents — uncomment and set your hosts
# your-agent-01 ansible_user=root country=YOUR_COUNTRY environment=YOUR_ENV customer=YOUR_ORG use_journald=true
# your-agent-02 ansible_user=root country=YOUR_COUNTRY environment=YOUR_ENV customer=YOUR_ORG use_journald=true

# Central collector on same host (loopback) example:
# otel-master ansible_host=YOUR_OTEL_MASTER_IP ansible_user=root \
#   master_otlp_http=http://127.0.0.1:4318 master_otlp_grpc=127.0.0.1:4317 \
#   telemetry_prom_host=127.0.0.1 telemetry_prom_port=8889

[agents:vars]
# HTTPS ingress to central OTel gateway (recommended for multi-site / cloud)
master_otlp_http=https://otel.yourdomain.tld
master_otlp_grpc=otel.yourdomain.tld:443

otelcol_version=0.131.0
enable_traces=false

# ---------------------------------------------------------------------------
# Kubernetes: deploy edge collector via deploy_otel_k8s.yml
# Each host = one cluster; set kubeconfig path per host.
# ---------------------------------------------------------------------------
[k8s_clusters]
# cluster-example  kubeconfig=/path/to/kubeconfig.conf  service_name=example-cluster

[k8s_clusters:vars]
master_otlp_http=https://otel.yourdomain.tld
master_otlp_grpc=otel.yourdomain.tld:443
customer=YOUR_ORG
environment=YOUR_ENV
country=YOUR_COUNTRY
service_name=k8s-cluster
otelcol_version=0.131.0
