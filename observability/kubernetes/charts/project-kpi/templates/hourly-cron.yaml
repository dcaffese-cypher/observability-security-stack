apiVersion: batch/v1
kind: CronJob
metadata:
  name: vmbackup-hourly
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: victoria-metrics-single
                      app.kubernetes.io/instance: {{ .Release.Name }}
                      app: server
                  topologyKey: kubernetes.io/hostname
          volumes:
            - name: source-volume
              persistentVolumeClaim:
                claimName: "server-volume-{{ .Release.Name }}-victoria-metrics-single-server-0"
          containers:
            - name: test-vmbackup
              image: victoriametrics/vmbackup
              command: ["/bin/sh", "-c"]
              args:
                - |
                  ./vmbackup-prod \
                    -storageDataPath=/source \
                    -snapshot.createURL=http://{{ .Release.Name }}-victoria-metrics-single-server.{{ .Release.Namespace }}.svc.cluster.local:8428/snapshot/create \
                    -customS3Endpoint={{ .Values.backup.customS3Endpoint }} \
                    -dst=s3://{{ .Values.backup.BackupBucket }}/vm-backups/{{ .Values.backup.HourylPath }}
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3SecretName }}
                      key: key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3SecretName }}
                      key: secret
              volumeMounts:
                - mountPath: "/source"
                  name: source-volume
---