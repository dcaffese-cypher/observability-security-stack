            __dashboardUid__: 4bce95bd-8428-416d-afdd-013deab4cd28
            __panelId__: "5"
            summary: interface issue (instance={{ $labels.instance }}, interface={{ $labels.interface }})
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: observability-default
        - uid: eew1wfes15vk0d
