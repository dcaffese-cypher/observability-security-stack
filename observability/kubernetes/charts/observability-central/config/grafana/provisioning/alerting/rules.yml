apiVersion: 1
groups:
    - orgId: 1
      name: 1m
      folder: Network Alerts
      interval: 1m
      rules:
        - uid: aew20ifna6whsd
          title: Interfaces went down within 5 minutes
          condition: C
          data:
            - refId: B
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: prometheus
              model:
                adhocFilters: []
                datasource:
                    type: prometheus
                    uid: prometheus
                editorMode: code
                exemplar: false
                expr: "(nvswitch_interface_oper_state{instance=~\".*\"} == 2\r\n  or nvswitch_interface_oper_state{instance=~\".*\"} == 8)\r\nand on(instance, interface)\r\n  (changes(nvswitch_interface_oper_state{instance=~\".*\"}[5m]) > 0)\r\n"
                instant: false
                interval: ""
                intervalMs: 60000
                legendFormat: '{{instance}} {{interface}}'
                maxDataPoints: 43200
                range: true
                refId: B
            - refId: A
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: A
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          dashboardUid: 4bce95bd-8428-416d-afdd-013deab4cd28
          panelId: 5
          noDataState: NoData
          execErrState: Error
          for: 1m
