    - orgId: 2
      name: k8s-resource-alerts
      folder: K8S Alerts
      interval: 1m
      rules:
        - uid: k8s-cpu-high
          title: "Node CPU Usage High (>80%)"
          condition: B
          for: 5m
          noDataState: NoData
          execErrState: OK
          labels:
            severity: warning
            team: assembly
            dashboard: k8s-resource-overview
          annotations:
            description: "Node {{ $labels.node }} CPU usage is above 80%. Check running pods."
            summary: "High CPU on node {{ $labels.node }}"
          data:
            - refId: A
              datasourceUid: victoria-metrics
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: A
                datasource:
                  type: prometheus
                  uid: victoria-metrics
                expr: "sum(rate(container_cpu_usage_seconds_total{container!=\"\",id!=\"\"}[5m])) by (node) / sum(kube_node_status_allocatable{resource=\"cpu\",unit=\"core\"}) by (node) * 100"
                instant: true
                intervalMs: 60000
                maxDataPoints: 43200
            - refId: B
              datasourceUid: __expr__
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: B
                type: threshold
                datasource:
                  type: __expr__
                  uid: __expr__
                conditions:
                  - evaluator:
                      type: gt
                      params: [80]
                    operator:
                      type: and
                    query:
                      params: [A]
                    reducer:
                      type: last
                      params: []
                    type: query

        - uid: k8s-memory-high
          title: "Node Memory Usage High (>85%)"
          condition: B
          for: 5m
          noDataState: NoData
          execErrState: OK
          labels:
            severity: warning
            team: assembly
            dashboard: k8s-resource-overview
          annotations:
            description: "Node {{ $labels.node }} memory usage is above 85%."
            summary: "High memory on node {{ $labels.node }}"
