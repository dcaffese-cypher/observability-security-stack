            - refId: A
              datasourceUid: victoria-metrics
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: A
                datasource:
                  type: prometheus
                  uid: victoria-metrics
                expr: "sum(container_memory_working_set_bytes{container!=\"\",id!=\"\"}) by (node) / sum(kube_node_status_allocatable{resource=\"memory\",unit=\"byte\"}) by (node) * 100"
                instant: true
                intervalMs: 60000
                maxDataPoints: 43200
            - refId: B
              datasourceUid: __expr__
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: B
                type: threshold
                datasource:
                  type: __expr__
                  uid: __expr__
                conditions:
                  - evaluator:
                      type: gt
                      params: [85]
                    operator:
                      type: and
                    query:
                      params: [A]
                    reducer:
                      type: last
                      params: []
                    type: query

        - uid: k8s-pod-crashloop
          title: "Pod CrashLoopBackOff (>3 restarts/15min)"
          condition: B
          for: 2m
          noDataState: NoData
          execErrState: OK
          labels:
            severity: critical
            team: assembly
            dashboard: k8s-resource-overview
          annotations:
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in last 15 min."
            summary: "CrashLoop: {{ $labels.namespace }}/{{ $labels.pod }}"
          data:
            - refId: A
              datasourceUid: victoria-metrics
              queryType: ""
              relativeTimeRange:
                from: 900
                to: 0
              model:
                refId: A
                datasource:
                  type: prometheus
                  uid: victoria-metrics
                expr: "increase(kube_pod_container_status_restarts_total[15m])"
                instant: true
                intervalMs: 60000
                maxDataPoints: 43200
            - refId: B
              datasourceUid: __expr__
              queryType: ""
              relativeTimeRange:
                from: 900
                to: 0
              model:
                refId: B
                type: threshold
                datasource:
                  type: __expr__
                  uid: __expr__
                conditions:
                  - evaluator:
                      type: gt
                      params: [3]
                    operator:
                      type: and
                    query:
                      params: [A]
                    reducer:
                      type: last
                      params: []
                    type: query

        - uid: k8s-pvc-full
          title: "PVC Storage Almost Full (>80%)"
          condition: B
          for: 10m
          noDataState: NoData
          execErrState: OK
          labels:
            severity: warning
            team: assembly
            dashboard: k8s-resource-overview
          annotations:
            description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is above 80% capacity."
            summary: "PVC {{ $labels.persistentvolumeclaim }} is almost full"
          data:
            - refId: A
              datasourceUid: victoria-metrics
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: A
                datasource:
                  type: prometheus
                  uid: victoria-metrics
                expr: "kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100"
                instant: true
                intervalMs: 60000
                maxDataPoints: 43200
            - refId: B
              datasourceUid: __expr__
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: B
                type: threshold
                datasource:
                  type: __expr__
                  uid: __expr__
                conditions:
                  - evaluator:
                      type: gt
                      params: [80]
                    operator:
                      type: and
                    query:
                      params: [A]
                    reducer:
                      type: last
                      params: []
                    type: query

        - uid: k8s-ns-cpu-spike
          title: "Namespace CPU Spike (>0.5 cores)"
          condition: B
          for: 5m
          noDataState: NoData
          execErrState: OK
          labels:
            severity: warning
            team: assembly
            dashboard: k8s-resource-overview
          annotations:
            description: "Namespace {{ $labels.namespace }} is using more than 0.5 CPU cores."
            summary: "CPU spike in namespace {{ $labels.namespace }}"
          data:
            - refId: A
              datasourceUid: victoria-metrics
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: A
                datasource:
                  type: prometheus
                  uid: victoria-metrics
                expr: "sum(irate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[2m])) by (namespace)"
                instant: true
                intervalMs: 60000
                maxDataPoints: 43200
            - refId: B
              datasourceUid: __expr__
              queryType: ""
              relativeTimeRange:
                from: 600
                to: 0
              model:
                refId: B
                type: threshold
                datasource:
                  type: __expr__
                  uid: __expr__
                conditions:
                  - evaluator:
                      type: gt
                      params: [0.5]
                    operator:
                      type: and
                    query:
                      params: [A]
                    reducer:
                      type: last
                      params: []
                    type: query
