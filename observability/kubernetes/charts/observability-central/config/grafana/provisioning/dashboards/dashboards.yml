# Grafana dashboard provider: load JSON dashboards from the json/ subdir.
# allowUiUpdates: true and disableDeletion: false allow editing and deleting from the UI.
apiVersion: 1
providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/observability-json
