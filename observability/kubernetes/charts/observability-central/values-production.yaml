# Production scalability overrides (merge with values.yaml).
# Deploy:
#   helm upgrade --install observability-central . -n observability \
#     -f values.yaml -f values.local.yaml -f values-production.yaml
# See docs/architecture/production-scalability.md.

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      replicas: 2

otel-deploy:
  replicaCount: 2

# Logs at scale: disable single and enable cluster; then override OTel
# logs_endpoint and Grafana Victoria Logs datasource URL per comments in values.yaml
# (victoria-logs-cluster section).
# victoria-logs-single:
#   enabled: false
# victoria-logs-cluster:
#   enabled: true
