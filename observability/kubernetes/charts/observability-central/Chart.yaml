apiVersion: v2
name: observability-central
description: Central observability using community charts (kube-prometheus-stack + loki) + OTel Collector. Replaces observability-master custom chart.
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - observability
  - prometheus
  - loki
  - grafana
  - opentelemetry
maintainers:
  - name: Observability maintainers

dependencies:
  - name: kube-prometheus-stack
    version: "75.5.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: loki
    version: "6.32.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: victoria-metrics-single
    version: "0.32.0"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-single.enabled
