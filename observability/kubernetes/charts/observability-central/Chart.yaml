apiVersion: v2
name: observability-central
description: Central observability using community charts (kube-prometheus-stack + VictoriaMetrics/VictoriaLogs) + OTel Collector. Replaces observability-master custom chart.
type: application
version: 0.2.0
appVersion: "1.0"
keywords:
  - observability
  - prometheus
  - grafana
  - opentelemetry
maintainers:
  - name: YOUR_ORG Observability
dependencies:
  - name: kube-prometheus-stack
    version: "75.5.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: victoria-metrics-single
    version: "0.32.0"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-single.enabled
  - name: victoria-logs-single
    version: "0.13.6"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-logs-single.enabled
  - name: prometheus-blackbox-exporter
    version: "9.1.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: blackboxExporter.enabled
  - name: opentelemetry-collector
    version: "0.147.1"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: otel-deploy
  - name: opentelemetry-collector
    version: "0.147.1"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    alias: otel-daemonset
  - name: victoria-metrics-cluster
    version: "0.44.0"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-metrics-cluster.enabled
  - name: victoria-logs-cluster
    version: "0.2.7"
    repository: https://victoriametrics.github.io/helm-charts/
    condition: victoria-logs-cluster.enabled
