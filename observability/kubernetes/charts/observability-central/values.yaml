# Observability central: kube-prometheus-stack + loki (community charts) + OTel Collector
# Deploy: helm dependency update && helm upgrade --install observability-central . -n observability --create-namespace -f values.yaml
# Production (Loki Distributed, Prometheus HA): add -f values-production.yaml and see docs/production-scalability.md
# Backup of previous custom chart: helm/observability-master-backup

namespace: observability

# Grafana admin: credentials from Kubernetes Secret (not in repo). See runbook §3 to create/update the secret.

# Our dashboards and alerting (provisioned via ConfigMaps + extraConfigmapMounts)
customGrafana:
  dashboardFiles:
    - "Cumulus SNMP – Interfaces & Switch Overview-1764860425841.json"
    - "NETWORK-1759346331550.json"
    - "WAZUH - FIM-1759346491136.json"
    - "WAZUH - MITRE ATT&CK-1759346504913.json"
    - "WAZUH - SYSTEM SECURITY AUDIT-1759346516530.json"
    - "WAZUH - SYSTEM VULNERABILITIES-1759346528934.json"
    - "WAZUH SUMMARY-1759346538593.json"
    - cumulus-snmp-dashboard.json
    - cumulus.json
    - cumulus_switch.json
    - snmp-interfaces.json

# Prometheus and Loki: let Kubernetes schedule (no nodeSelector/nodeAffinity).
kube-prometheus-stack:
  enabled: true
  nameOverride: ""
  fullnameOverride: ""
  namespace: observability
  prometheus:
    fullnameOverride: "prometheus"
    prometheusSpec:
      replicas: 1
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: null
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: prometheus
          metrics_path: /metrics
          static_configs:
            - targets: ['prometheus:9090']
        - job_name: loki
          metrics_path: /metrics
          static_configs:
            - targets: ['observability-central-loki:3100']
        - job_name: otel-collector
          metrics_path: /metrics
          static_configs:
            - targets: ['otel-collector:8888']
        - job_name: grafana
          metrics_path: /metrics
          static_configs:
            - targets: ['grafana:3000']
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: '([^:]+)(?::\d+)?;(\d+)'
              replacement: '${1}:${2}'
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: kubernetes_pod_name
        - job_name: kubernetes-endpoints
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_namespace]
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_service_name]
              target_label: kubernetes_name
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: kubernetes_pod_name
        - job_name: cumulus-snmp-interfaces
          metrics_path: /snmp
          params:
            module: [if_mib]
            auth: [cumulus_v3]
          static_configs:
            # RFC 5737 documentation IPs — replace with your switch management addresses
            - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: snmp-exporter:9116
            - source_labels: []
              target_label: __metrics_path__
              replacement: /snmp
        - job_name: cumulus-snmp-lldp
          metrics_path: /snmp
          params:
            module: [cumulus_lldp]
            auth: [cumulus_v3]
          static_configs:
            # RFC 5737 documentation IPs — replace with your switch management addresses
            - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: snmp-exporter:9116
            - source_labels: []
              target_label: __metrics_path__
              replacement: /snmp
  grafana:
    fullnameOverride: "grafana"
    enabled: true
    # Admin user/password from Secret (runbook §3). Keys: admin-user, admin-password.
    admin:
      existingSecret: grafana-admin
    # Only our provisioned dashboards (customGrafana.dashboardFiles); stack default dashboards not loaded. Add others manually in UI.
    defaultDashboardsEnabled: false
    image:
      tag: "12.1.0"
    service:
      type: ClusterIP
    # Persist Grafana DB (imported dashboards, users, prefs). Survives helm upgrade and pod restarts.
    # Provisioned dashboards (ConfigMaps) still load from files; UI imports live on this PVC.
    persistence:
      enabled: true
      type: pvc
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: null
    # Admin user/password from Secret grafana-admin (see runbook §3); not stored in repo.
    # Logs Drilldown, Metrics Drilldown, Traces, Pyroscope are all core apps in
    # Grafana 12.x — do NOT list them in plugins: (GF_INSTALL_PLUGINS) or an
    # external download will shadow the built-in version and break routing.
    plugins: []
    # Allow editing and deleting provisioned dashboards (stack and custom).
    sidecar:
      dashboards:
        provider:
          allowUiUpdates: true
          disableDeletion: false
    # Ingress (same pattern as k8s-infra: APISIX). Create TLS secret e.g. grafana-observability-tls in namespace observability.
    ingress:
      enabled: true
      ingressClassName: apisix
      hosts:
        - grafana.yourdomain.tld
      tls:
        - hosts:
            - grafana.yourdomain.tld
          secretName: grafana-observability-tls
    grafana.ini:
      server:
        # Use http so internal readiness/liveness probes work; TLS is at Ingress
        protocol: http
        domain: grafana.yourdomain.tld
        root_url: "https://grafana.yourdomain.tld/"
      # Avoid "SMTP not configured" errors when alerting uses the default email contact point.
      smtp:
        enabled: false
      # Feature toggles for Grafana Drilldown apps (see https://grafana.com/blog/grafana-drilldown-apps-the-improved-queryless-experience-formerly-known-as-the-explore-apps/)
      # exploreLogsShardSplitting: query streaming in Logs Drilldown (results as they're processed)
      # exploreMetricsRelatedLogs: pivot from Metrics Drilldown to related logs
      feature_toggles:
        enable: exploreLogsShardSplitting, exploreMetricsRelatedLogs
    additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        url: http://observability-central-loki:3100
        access: proxy
        isDefault: false
      # Victoria Metrics: new stack (OTel → VM → Grafana). PromQL compatible.
      - name: Victoria Metrics
        uid: victoria-metrics
        type: prometheus
        url: http://observability-central-victoria-metrics-single:8428
        access: proxy
        isDefault: false
    # Mount our dashboards/alerting/plugins in separate paths to avoid conflict with chart sidecar (sc-dashboard-provider)
    extraConfigmapMounts:
      - name: dashboards-provider
        mountPath: /etc/grafana/provisioning/dashboards/observability-dashboards.yml
        subPath: dashboards.yml
        configMap: grafana-dashboards-provider
        readOnly: true
      - name: dashboards-json
        mountPath: /etc/grafana/provisioning/dashboards/observability-json
        configMap: grafana-dashboards-json
        readOnly: true
      - name: alerting
        mountPath: /etc/grafana/provisioning/alerting
        configMap: grafana-alerting
        readOnly: true
      - name: plugins-provisioning
        mountPath: /etc/grafana/provisioning/plugins/plugins.yaml
        subPath: plugins.yaml
        configMap: grafana-plugins-provisioning
        readOnly: true

  alertmanager:
    # Disabled if your cluster has Service IP CIDR conflicts; enable when resolved.
    enabled: false
    # alertmanagerSpec: { replicas: 1, retention: 120h }

  defaultRules:
    create: true

  kube-state-metrics:
    enabled: true

  nodeExporter:
    enabled: true

loki:
  enabled: true
  deploymentMode: SingleBinary
  nameOverride: "observability-central-loki"
  fullnameOverride: "observability-central-loki"
  loki:
    auth_enabled: false
    # Note: OTel→Loki "message larger than max" is mitigated by reducing batch size in otelCollector config (see config/otelcol-config.yaml).
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2025-09-03"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      retention_period: 168h
      allow_structured_metadata: true
      # Required for Logs Drilldown app (volume/service view); Explore uses query API and works without this
      volume_enabled: true
      discover_log_levels: true
      # Label(s) used by Logs Drilldown for "service" list; we send service_name and k8s namespace/pod/container
      discover_service_name:
        - service_name
        - k8s_namespace_name
        - job
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
    # Required for Logs Drilldown "Patterns" tab (Loki 3.1+); see https://grafana.com/docs/plugins/grafana-lokiexplore-app/latest/troubleshooting/
    pattern_ingester:
      enabled: true
  # Disable gateway (we use Loki service directly); saves resources
  gateway:
    enabled: false
  # Disable canary (not needed for single-binary); saves 5 DaemonSet pods
  lokiCanary:
    enabled: false
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  test:
    enabled: false
  # Disable memcached caches to avoid high memory use on small nodes (e.g. chunks-cache was ~61% of node memory)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
  # Avoid SSL errors when the rules sidecar talks to the Kubernetes API (cluster CA may lack key usage extension).
  sidecar:
    skipTlsVerify: true

# Victoria Metrics Single: backend for the new stack (OTel gateway → VM → Grafana). Prometheus stays independent.
# Optionally pin Victoria Metrics to a node with enough disk/RAM (nodeSelector in subchart values if needed).
victoria-metrics-single:
  enabled: true
  server:
    fullnameOverride: "observability-central-victoria-metrics-single"
    persistentVolume:
      enabled: true
      size: 20Gi

# OTel Collector Gateway (Assembly): receives OTLP from Cloud agents; exports metrics to Victoria Metrics, logs to Loki.
# Expose via Ingress (HTTPS) so Cloud can send to https://otel.<assembly-domain>/ (OTLP HTTP on 4318).
otelCollector:
  enabled: true
  replicas: 2
  # Resources to avoid OOM/eviction; HPA can scale from minReplicas up to maxReplicas.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # HPA: scale on CPU when more agents send OTLP (min 2 for HA, max 5).
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # Victoria Metrics write endpoint (metrics pipeline). VM is deployed by victoria-metrics-single subchart.
  victoriaMetricsWriteEndpoint: "http://observability-central-victoria-metrics-single:8428/api/v1/write"
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.131.0"
  service:
    type: ClusterIP
  # Ingress: exposes the OTel gateway over HTTPS so Cloud uses only this endpoint (master_otlp_http).
  # Also apply manifests/otel-collector-ingress-tls-apisix.yaml (Certificate + ApisixTls) in the cluster.
  ingress:
    enabled: true
    host: "otel.yourdomain.tld"
    className: "apisix"
    tls: true
    tlsSecretName: "otel-collector-tls"
