# Observability central: kube-prometheus-stack + VictoriaMetrics/VictoriaLogs (cluster) + OTel Collector
# Deploy: helm dependency update && helm upgrade --install observability-central . -n observability --create-namespace -f values.yaml
# Backup of previous custom chart: helm/observability-master-backup

namespace: observability

# VictoriaMetrics Backup: aligned with Sean's kpi-archive-1 pattern (vmbackup-prod + customS3Endpoint).
# Requires: S3-compatible bucket + Secret with keys "key" and "secret" (same as project-kpi).
# To enable: set enabled=true, create the Secret, and ensure the PVC name matches the VM StatefulSet.
vmBackup:
  enabled: true
  image:
    repository: victoriametrics/vmbackup
    tag: latest
  vmServiceName: "observability-central-victoria-metrics-single-server"
  pvcName: "server-volume-observability-central-victoria-metrics-single-server-0"
  s3:
    bucket: "YOUR_VM_BACKUP_BUCKET"
    endpoint: "https://objectstore.yourdomain.tld:2222"
    hourlyPath: "latest"
    credentialsSecret: "s3-credentials"

vmBackupCluster:
  enabled: false
  replicas: 2
  image:
    repository: victoriametrics/vmbackup
    tag: latest
  vmServiceName: "vm-cluster-storage"
  s3:
    bucket: "YOUR_VM_CLUSTER_BACKUP_BUCKET"
    endpoint: "https://objectstore.yourdomain.tld:2222"
    hourlyPath: "latest"
    credentialsSecret: "s3-credentials"

# Blackbox Exporter (subchart: prometheus-blackbox-exporter).
# Probes public HTTPS endpoints for availability and TLS certificate validity.
blackboxExporter:
  enabled: true

prometheus-blackbox-exporter:
  fullnameOverride: blackbox-exporter
  config:
    modules:
      https_2xx:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: [200, 401]
          method: GET
          fail_if_ssl: false
          fail_if_not_ssl: true
          tls_config:
            insecure_skip_verify: false
          preferred_ip_protocol: ip4

# Gateway API (Envoy Gateway)
# The infra cluster migrated away from APISIX Ingress to Gateway API HTTPRoute.
# These values create HTTPRoutes that attach to the shared Gateway managed in the k8s-infra repo.
gatewayAPI:
  enabled: true
  parentRef:
    name: ingress
    namespace: envoy-gateway-system
  grafana:
    hostname: grafana.yourdomain.tld
    sectionName: grafana-https
    service:
      name: grafana
      port: 80
  otelCollector:
    hostname: otel.yourdomain.tld
    sectionName: otel-https
    service:
      name: otel-collector-central
      port: 4318

# Grafana admin: credentials from Kubernetes Secret (not in repo). See runbook §3 to create/update the secret.

# Prometheus: let Kubernetes schedule (no nodeSelector/nodeAffinity).
kube-prometheus-stack:
  enabled: true
  crds:
    enabled: false
  nameOverride: ""
  fullnameOverride: ""
  namespace: observability
  prometheus:
    fullnameOverride: "prometheus"
    prometheusSpec:
      replicas: 1
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "YOUR_STORAGE_CLASS"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        # Interesting idea to monitor the services, we can keep this prometheus instance around to monitor the stack
        - job_name: prometheus
          metrics_path: /metrics
          static_configs:
            - targets: ['prometheus:9090']
        - job_name: otel-collector
          metrics_path: /metrics
          static_configs:
            - targets: ['otel-collector-central:8888']
        - job_name: grafana
          metrics_path: /metrics
          static_configs:
            - targets: ['grafana:3000']
        # TODO Migrate dashboards to use VMetrics as a data source, then remove these job entries -> they are migrated to the prometheus reciever in otel
        # Blackbox: HTTPS endpoint probes (availability + TLS cert validity)
        - job_name: blackbox-https
          metrics_path: /probe
          params:
            module: [https_2xx]
          static_configs:
            - targets:
                - https://argocd.yourdomain.tld
                - https://grafana.yourdomain.tld
                - https://otel.yourdomain.tld
                - https://vault.yourdomain.tld
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: blackbox-exporter:9115
        - job_name: cumulus-snmp-interfaces
          metrics_path: /snmp
          params:
            module: [if_mib]
            auth: [cumulus_v3]
          static_configs:
            - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: snmp-exporter:9116
            - source_labels: []
              target_label: __metrics_path__
              replacement: /snmp
        - job_name: cumulus-snmp-lldp
          metrics_path: /snmp
          params:
            module: [cumulus_lldp]
            auth: [cumulus_v3]
          static_configs:
            - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: snmp-exporter:9116
            - source_labels: []
              target_label: __metrics_path__
              replacement: /snmp
  # Use this chart to deploy kubelet and state metrics
  kubelet:
    enabled: true
    serviceMonitor:
      probes: false
      resource: false
      cAdvisor: true
      metricRelabelings:
          - action: keep
            regex: (kubelet_volume_stats_inodes_used|kubelet_volume_stats_inodes|machine_cpu_cores|container_cpu_usage_seconds_total|machine_memory_bytes|kubelet_volume_stats_used_bytes|kubelet_volume_stats_capacity_bytes|kubelet_volume_stats_available_bytes|container_memory_rss|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total)
            sourceLabels: [__name__]
  kubeStateMetrics:
    enabled: true
  prometheus-node-exporter:
    prometheus:
      monitor:
        metricRelabelings:
          - action: keep
            regex: (node_cpu_core_throttles_total|node_filesystem_files|node_time_seconds|node_boot_time_seconds|node_filefd_maximum|node_filefd_allocated|node_memory_Buffers_bytes|node_memory_Cached_bytes|node_memory_MemFree_bytes|node_memory_SwapTotal_bytes|node_memory_SwapFree_bytes|node_load1|node_load5|node_load15|node_context_switches_total|node_intr_total|node_timex_estimated_error_seconds|node_timex_maxerror_seconds|node_network_receive_errs_total|node_network_transmit_errs_total|node_network_receive_drop_total|node_network_transmit_drop_total|node_netstat_Tcp_CurrEstab|node_nf_conntrack_entries|node_nf_conntrack_entries_limit|node_filesystem_avail_bytes|node_filesystem_size_bytes|node_filesystem_files_free|node_disk_read_bytes_total|node_disk_written_bytes_total|node_disk_reads_completed_total|node_disk_writes_completed_total|node_disk_io_now|node_filesystem_device_error|node_cpu_seconds_total|node_memory_MemTotal_bytes|node_memory_MemAvailable_bytes|node_network_receive_bytes_total|node_network_transmit_bytes_total|node_network_receive_packets_total|node_network_transmit_packets_total)
            sourceLabels: [__name__]
  kube-state-metrics:
    prometheus:
      monitor:
        interval: "15s"
        metricRelabelings:
          - action: keep
            regex: (kube_pod_info|kube_node_status_condition|kube_node_status_allocatable|kube_ingress_path|kube_node_spec_unschedulable|kube_node_spec_taint|kube_pod_container_resource_requests|kube_pod_container_resource_limits|kube_pod_container_status_restarts_total|kube_pod_container_info|kube_pod_created|kube_node_info|kube_namespace_created|kube_pod_labels|kube_pod_status_phase|kube_pod_container_status_running|kube_service_info|kube_namespace_labels|kube_endpoint_info|kube_deployment_labels|kube_statefulset_labels|kube_daemonset_labels|kube_persistentvolumeclaim_info|kube_pod_spec_volumes_persistentvolumeclaims_info|kube_hpa_labels|kube_configmap_info|kube_secret_info|kube_networkpolicy_labels)
            sourceLabels: [__name__]
    metricLabelsAllowlist:
      - pods=[*]

  grafana:
    fullnameOverride: "grafana"
    enabled: true
    # Admin user/password from Secret (runbook §3). Keys: admin-user, admin-password.
    admin:
      existingSecret: grafana-admin
    # GitHub OAuth: client_id/secret from Secret grafana-secret (keys GF_AUTH_GITHUB_* and GF_AUTH_GENERIC_OAUTH_*).
    # Secret must be manually created in cluster from manifests/grafana-secret.example.yaml (Bitwarden: Observability/Grafana OIDC Client).
    envFromSecret: grafana-secret
    # Existing PVC: disable init chown to avoid Permission denied on png/pdf/csv dirs.
    initChownData:
      enabled: false
    # Only our provisioned dashboards (customGrafana.dashboardFiles); stack default dashboards not loaded. Add others manually in UI.
    defaultDashboardsEnabled: false
    image:
      tag: "12.1.0"
    service:
      type: ClusterIP
    # Persist Grafana DB (imported dashboards, users, prefs). Survives helm upgrade and pod restarts.
    # Provisioned dashboards (ConfigMaps) still load from files; UI imports live on this PVC.
    persistence:
      enabled: true
      type: pvc
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: "YOUR_STORAGE_CLASS"
    # Admin user/password from Secret grafana-admin (see runbook §3); not stored in repo.
    # Logs Drilldown, Metrics Drilldown, Traces, Pyroscope are all core apps in
    # Grafana 12.x — do NOT list them in plugins: (GF_INSTALL_PLUGINS) or an
    # external download will shadow the built-in version and break routing.
    plugins:
      - victoriametrics-logs-datasource
    # Allow editing and deleting provisioned dashboards (stack and custom).
    sidecar:
      datasources:
        enabled: true
        defaultDatasourceEnabled: false
        isDefaultDatasource: false
      dashboards:
        provider:
          allowUiUpdates: true
          disableDeletion: false
        SCProvider: false
    # Legacy Ingress (APISIX). Deprecated in infra cluster (Gateway API is used instead).
    ingress:
      enabled: false
      ingressClassName: apisix
      hosts:
        - grafana.yourdomain.tld
      tls:
        - hosts:
            - grafana.yourdomain.tld
          secretName: grafana-observability-tls
    grafana.ini:
      server:
        # Use http so internal readiness/liveness probes work; TLS is at Ingress
        protocol: http
        domain: grafana.yourdomain.tld
        root_url: "https://grafana.yourdomain.tld/"
      # Avoid "SMTP not configured" errors when alerting uses the default email contact point.
      smtp:
        enabled: false
      # Feature toggles for Grafana Drilldown apps (see https://grafana.com/blog/grafana-drilldown-apps-the-improved-queryless-experience-formerly-known-as-the-explore-apps/)
      # exploreLogsShardSplitting: query streaming in Logs Drilldown (results as they're processed)
      # exploreMetricsRelatedLogs: pivot from Metrics Drilldown to related logs
      feature_toggles:
        enable: exploreLogsShardSplitting, exploreMetricsRelatedLogs
      # auth.auto_assign_org kept enabled, but primary org is now named "YOUR_ORG" (id=1).
      # org_mapping assigns users to YOUR_ORG + mission orgs on every login; org names must not contain spaces.
      auth:
        auto_assign_org: true
        auto_assign_org_id: 1
      # GitHub OAuth — aligned with k8s-infra cluster/applications/templates/prometheus.yaml.
      # client_id / client_secret loaded from envFromSecret (grafana-secret); not hardcoded here.
      # org_mapping requires Grafana orgs to be pre-created — see templates/grafana-org-bootstrap.yaml.
      auth.github:
        enabled: true
        scopes: user:email,read:org
        auth_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        api_url: https://api.github.com/user
        role_attribute_path: contains(groups[*], '@YOUR_GITHUB_ORG/assembly') && 'Admin' || 'Viewer'
        allow_sign_up: true
        auto_login: false
        # Ensure org roles and org_mapping are re-evaluated on every login for existing users.
        # Without this, Grafana skips role sync for previously seen users.
        skip_org_role_sync: false
        # team_ids removed: allowed_organizations already gates access to YOUR_GITHUB_ORG members only.
        # Keeping team_ids would block all non-Assembly members from logging in.
        allowed_organizations: ["YOUR_GITHUB_ORG"]
        # org_mapping: each mission team is Admin in their own org, Viewer in all others.
        # "*:YOUR_ORG:Viewer" baseline ensures every authenticated YOUR_GITHUB_ORG member lands in YOUR_ORG (id=1).
        # Assembly is Admin in YOUR_ORG since it is the platform team.
        # No spaces in any org name — Grafana uses space as separator in this field.
        # org_mapping order matters: specific team rules must come BEFORE wildcards.
        # "*:<org>:Viewer" for mission orgs would override team-specific Admin rules
        # because Grafana applies the first match. Use specific team rules only for
        # mission orgs; "*:YOUR_ORG:Viewer" covers the shared org for all users.
        org_mapping: >-
          @YOUR_GITHUB_ORG/assembly:YOUR_ORG:Admin
          @YOUR_GITHUB_ORG/assembly:Assembly:Admin
          @YOUR_GITHUB_ORG/access:Access:Admin
          @YOUR_GITHUB_ORG/application:Application:Admin
          @YOUR_GITHUB_ORG/cloud:Cloud:Admin
          @YOUR_GITHUB_ORG/conversion:Conversion:Admin
          *:YOUR_ORG:Viewer
          *:Access:Viewer
          *:Application:Viewer
          *:Assembly:Viewer
          *:Cloud:Viewer
          *:Conversion:Viewer
    additionalDataSources:
      # Victoria Metrics: new stack (OTel → VM → Grafana). PromQL compatible.
      - name: Victoria Metrics
        uid: victoria-metrics
        type: prometheus
        url: http://observability-central-victoria-metrics-single-server:8428
        access: proxy
        isDefault: false
      - name: Victoria Logs
        uid: victoria-logs
        type: victoriametrics-logs-datasource
        url: http://observability-central-victoria-logs-single-server:9428
        access: proxy
        isDefault: false
    # Mount our dashboards/alerting/plugins in separate paths to avoid conflict with chart sidecar (sc-dashboard-provider)
    extraConfigmapMounts:
      - name: dashboards-provider
        mountPath: /etc/grafana/provisioning/dashboards/observability-dashboards.yml
        subPath: dashboards.yml
        configMap: grafana-dashboards-provider
        readOnly: true
      - name: alerting
        mountPath: /etc/grafana/provisioning/alerting
        configMap: grafana-alerting
        readOnly: true
      - name: plugins-provisioning
        mountPath: /etc/grafana/provisioning/plugins/plugins.yaml
        subPath: plugins.yaml
        configMap: grafana-plugins-provisioning
        readOnly: true

  alertmanager:
    # Disabled: when enabled, the cluster fails with "failed to allocate a serviceIP" (CIDR YOUR_CLUSTER_SERVICE_CIDR vs existing IPs). Enable when the service IP range is fixed.
    enabled: false
    # alertmanagerSpec: { replicas: 1, retention: 120h }

  defaultRules:
    create: true

  nodeExporter:
    enabled: true


