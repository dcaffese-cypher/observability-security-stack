# Victoria Logs Cluster (production). Single remains available for dev/staging.
# To enable: set victoria-logs-cluster.enabled: true in the environment overlay.
# OTel logs_endpoint must be overridden to vlinsert in the overlay (see MR 3).
# Grafana victoria-logs datasource URL must be overridden to vlselect in the overlay.
victoria-logs-cluster:
  enabled: false

  vlinsert:
    replicaCount: 2

  vlselect:
    replicaCount: 2

  vlstorage:
    replicaCount: 2
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClassName: "YOUR_STORAGE_CLASS"   # override in assembly overlay: csi-cinder-sc-retain

# Official OTel Collector subchart config (used when otelCollector.useChart=true).
# Mirrors the custom deployment config: same pipelines, same exporters, same RBAC.
# Canary: deploy as a separate release (otel-collector-canary) before cutover.
otel-deploy:

  enabled: true

  mode: deployment
  # clusterMetrics preset requires replicaCount=1 to avoid duplicate cluster metrics.
  # OTLP ingestion HA is handled at the Gateway/load-balancer level.
  replicaCount: 1
  fullnameOverride: otel-collector-central

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.131.0"

  resources:
    requests:
      memory: 2Gi
    limits:
      memory: 4Gi

  # clusterMetrics preset: auto-configures k8s_cluster receiver + ClusterRole rules.
  presets:
    clusterMetrics:
      enabled: true
    kubernetesAttributes:
      enabled: false

  # health_check extension uses /ready path; override chart default probes (which use /).
  livenessProbe:
    httpGet:
      path: /ready
      port: 13133
  readinessProbe:
    httpGet:
      path: /ready
      port: 13133

  # Ports exposed by the collector service.
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP

  config:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /ready

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins: ["http://*"]
      # k8s_cluster is injected automatically by the clusterMetrics preset above.
      prometheus:
        config:
          # TODO: Remove. Prometheus scrape jobs are deployment specific, and should be defined at point of install, and not in the helm default values.
          scrape_configs:
            - job_name: federate
              honor_labels: true
              metrics_path: /federate
              params:
                'match[]':
                  - '{job="prometheus"}'
                  - '{job="otel-collector"}'
                  - '{job="kubelet"}'
                  - '{job="grafana"}'
                  - '{job="node-exporter"}'
                  - '{job="kube-state-metrics"}'
              static_configs:
                - targets:
                    - observability-central-kube-prometheus.observability.svc.cluster.local:9090
            - job_name: blackbox-https
              metrics_path: /probe
              params:
                module: [https_2xx]
              static_configs:
                - targets:
                    - https://argocd.yourdomain.tld
                    - https://grafana.yourdomain.tld
                    - https://otel.yourdomain.tld
                    - https://vault.yourdomain.tld
              relabel_configs:
                - source_labels: [__address__]
                  target_label: __param_target
                - source_labels: [__param_target]
                  target_label: instance
                - target_label: __address__
                  replacement: blackbox-exporter:9115
            # No longer working? Should be coming from cloud as opposed to our direct scrapes
            # - job_name: cumulus-snmp-interfaces
            #   metrics_path: /snmp
            #   params:
            #     module: [if_mib]
            #     auth: [cumulus_v3]
            #   static_configs:
            #     - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
            #   relabel_configs:
            #     - source_labels: [__address__]
            #       target_label: __param_target
            #     - source_labels: [__param_target]
            #       target_label: instance
            #     - target_label: __address__
            #       replacement: snmp-exporter:9116
            #     - source_labels: []
            #       target_label: __metrics_path__
            #       replacement: /snmp
            # - job_name: cumulus-snmp-lldp
            #   metrics_path: /snmp
            #   params:
            #     module: [cumulus_lldp]
            #     auth: [cumulus_v3]
            #   static_configs:
            #     - targets: [192.0.2.10, 192.0.2.11, 192.0.2.12, 192.0.2.13]
            #   relabel_configs:
            #     - source_labels: [__address__]
            #       target_label: __param_target
            #     - source_labels: [__param_target]
            #       target_label: instance
            #     - target_label: __address__
            #       replacement: snmp-exporter:9116
            #     - source_labels: []
            #       target_label: __metrics_path__
            #       replacement: /snmp

    processors:
      resource/central-cluster-identity:
        attributes:
          - action: upsert
            key: cluster
            value: inf
          - action: upsert
            key: environment
            value: production
      attributes/ensure-service-name:
        actions:
          - action: insert
            key: service.name
            from_attribute: host.name
      batch:
        send_batch_size: 500
        timeout: 2s
      batch/logs:
        send_batch_size: 100
        timeout: 2s
      attributes/map-labels:
        actions:
          - action: upsert
            key: CLIENT
            from_attribute: customer
          - action: upsert
            key: ENVIRONMENT
            from_attribute: environment
          - action: upsert
            key: COUNTRY
            from_attribute: country
          - action: upsert
            key: SERVICE_NAME
            from_attribute: service.name
      attributes/copy-k8s-labels:
        actions:
          - action: insert
            key: namespace
            from_attribute: k8s.namespace.name
          - action: insert
            key: pod
            from_attribute: k8s.pod.name
          - action: insert
            key: node
            from_attribute: k8s.node.name
          - action: insert
            key: container
            from_attribute: k8s.container.name
          - action: insert
            key: deployment
            from_attribute: k8s.deployment.name

    exporters:
      prometheusremotewrite/victoria-metrics:
        endpoint: http://observability-central-victoria-metrics-single-server:8428/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        tls:
          insecure: true
      otlphttp/victorialogs:
        compression: gzip
        encoding: proto
        logs_endpoint: http://observability-central-victoria-logs-single-server.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        tls:
          insecure: true
      otlphttp/victoriametrics:
        metrics_endpoint: http://observability-central-victoria-metrics-single-server:8428/opentelemetry/v1/metrics
        tls:
          insecure: true

    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: "0.0.0.0"
                    port: 8888
      extensions: [health_check]

      # otlp logs and metrics should not by default recieve the central cluster identity. As they might not come from this cluster.
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite/victoria-metrics]
        metrics/inf-cluster:
          receivers: [prometheus]
          processors: [batch, resource/central-cluster-identity]
          exporters: [prometheusremotewrite/victoria-metrics]
        metrics/otel:
          receivers: [k8s_cluster]
          processors: [batch, resource/central-cluster-identity]
          exporters: [otlphttp/victoriametrics]
        logs:
          receivers: [otlp]
          processors: [attributes/copy-k8s-labels, batch/logs]
          exporters: [otlphttp/victorialogs]

otel-daemonset:

  mode: daemonset

  fullnameOverride: opentelemetry-daemonset

  image:
    repository: "otel/opentelemetry-collector-contrib"

  presets:
    logsCollection:
      enabled: true
    kubeletMetrics:
      enabled: true
    kubernetesAttributes:
      enabled: true
    hostMetrics:
      enabled: true

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins: ["http://*"]

      # Enabling the optional metrics we want from these recievers
      kubeletstats:
        metrics:
          k8s.node.uptime:
            enabled: true
          k8s.volume.available:
            enabled: true
          k8s.volume.capacity:
            enabled: true
        metric_groups: [node, pod, container, volume]
        extra_metadata_labels:
          - k8s.volume.type

      hostmetrics:
        scrapers:
          cpu:
            metrics:
              system.cpu.logical.count:
                enabled: true
              system.cpu.physical.count:
                enabled: true

    extensions: {}
    
    processors:
      resource/cluster-identity:
        attributes:
          - action: upsert
            key: cluster
            value: inf
          - key: k8s.node.name
            value: ${K8S_NODE_NAME}
            action: upsert

      attributes/copy-k8s-labels:
        actions:
          - action: insert
            key: namespace
            from_attribute: k8s.namespace.name
          - action: insert
            key: pod
            from_attribute: k8s.pod.name
          - action: insert
            key: node
            from_attribute: k8s.node.name
          - action: insert
            key: container
            from_attribute: k8s.container.name
          - action: insert
            key: deployment
            from_attribute: k8s.deployment.name

      batch/logs:
        send_batch_size: 100
        timeout: 2s

      resourcedetection/system:
        detectors: [system]
        override: false

    exporters:
      debug:
        verbosity: detailed
      otlphttp/victorialogs:
        compression: gzip
        encoding: proto
        logs_endpoint: http://observability-central-victoria-logs-single-server.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        tls:
          insecure: true
      otlphttp/victoriametrics:
        metrics_endpoint: http://observability-central-victoria-metrics-single-server:8428/opentelemetry/v1/metrics
        tls:
          insecure: true
      
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [attributes/copy-k8s-labels, batch/logs]
          exporters: [otlphttp/victorialogs]
        metrics:
          receivers: [kubeletstats, hostmetrics]
          processors: [batch, k8sattributes, resourcedetection/system, resource/cluster-identity]
          exporters: [debug, otlphttp/victoriametrics]