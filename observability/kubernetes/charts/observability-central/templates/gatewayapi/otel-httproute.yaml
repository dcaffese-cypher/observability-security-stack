{{- if .Values.gatewayAPI.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otel-route
  namespace: {{ .Values.namespace | default "observability" }}
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  parentRefs:
  - name: {{ .Values.gatewayAPI.parentRef.name }}
    namespace: {{ .Values.gatewayAPI.parentRef.namespace }}
    sectionName: {{ .Values.gatewayAPI.otelCollector.sectionName }}
  hostnames:
  - {{ .Values.gatewayAPI.otelCollector.hostname | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.gatewayAPI.otelCollector.service.name }}
      port: {{ .Values.gatewayAPI.otelCollector.service.port }}
{{- end }}
