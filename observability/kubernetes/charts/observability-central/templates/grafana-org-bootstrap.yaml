{{- /*
  grafana-org-bootstrap: idempotent Kubernetes Job that creates the five YOUR_ORG mission
  organisations in Grafana via the admin API after each Helm install/upgrade.

  Runs as a Helm post-install + post-upgrade hook so ArgoCD / GitOps deploys always
  converge. The Job is safe to re-run: it checks whether each org exists before
  creating it (GET /api/orgs/name/{org} → skip if found, POST /api/orgs if not).

  Prerequisites (manual, not in Git):
    Secret grafana-admin  (namespace: observability)
      keys: admin-user, admin-password
    Secret grafana-secret (namespace: observability)
      keys: GF_AUTH_GITHUB_CLIENT_ID, GF_AUTH_GITHUB_CLIENT_SECRET,
            GF_AUTH_GENERIC_OAUTH_CLIENT_ID, GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET

  Org mapping (must stay in sync with grafana.ini.auth.github.org_mapping in values.yaml):
    Assembly   → @YOUR_GITHUB_ORG/assembly → Admin
    Access     → @YOUR_GITHUB_ORG/access   → Viewer
    Application → @YOUR_GITHUB_ORG/application → Viewer
    Cloud      → @YOUR_GITHUB_ORG/cloud    → Viewer
    Conversion → @YOUR_GITHUB_ORG/conversion → Viewer
*/ -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-org-bootstrap
  namespace: {{ .Values.namespace | default "observability" }}
  labels:
    app.kubernetes.io/name: grafana-org-bootstrap
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-org-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              set -eu

              GRAFANA_URL="http://grafana.{{ .Values.namespace | default "observability" }}.svc.cluster.local:80"
              ADMIN_USER="$(cat /var/secrets/admin-user)"
              ADMIN_PASS="$(cat /var/secrets/admin-password)"

              # Wait for Grafana to be healthy (max 3 minutes)
              echo "Waiting for Grafana health..."
              i=0
              until curl -sf "${GRAFANA_URL}/api/health" > /dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -ge 36 ]; then
                  echo "ERROR: Grafana did not become healthy in time"
                  exit 1
                fi
                echo "  attempt $i/36 — retrying in 5s"
                sleep 5
              done
              echo "Grafana is healthy."

              # Create each org if it does not already exist
              # YOUR_ORG is org id=1 (renamed from "Main Org."); it always exists. Mission orgs created below.
              for ORG in Assembly Access Application Cloud Conversion; do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  "${GRAFANA_URL}/api/orgs/name/${ORG}")
                if [ "$STATUS" = "200" ]; then
                  echo "Org '${ORG}' already exists — skipping."
                else
                  RESULT=$(curl -s -w "\n%{http_code}" \
                    -u "${ADMIN_USER}:${ADMIN_PASS}" \
                    -X POST "${GRAFANA_URL}/api/orgs" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\": \"${ORG}\"}")
                  HTTP_CODE=$(echo "$RESULT" | tail -1)
                  BODY=$(echo "$RESULT" | head -1)
                  if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                    echo "Created org '${ORG}' (HTTP ${HTTP_CODE}): ${BODY}"
                  else
                    echo "ERROR creating org '${ORG}' (HTTP ${HTTP_CODE}): ${BODY}"
                    exit 1
                  fi
                fi
              done

              echo "All mission orgs are present."

              # Ensure mission orgs also have the same core datasources as YOUR_ORG.
              # Grafana provisioning files default to orgId=1, so we bootstrap mission
              # org datasources via Admin API to avoid manual per-org setup.
              ensure_datasource() {
                ORG_ID="$1"
                ORG_NAME="$2"
                DS_UID="$3"
                DS_NAME="$4"
                DS_TYPE="$5"
                DS_URL="$6"
                DS_DEFAULT="$7"

                DS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  -H "X-Grafana-Org-Id: ${ORG_ID}" \
                  "${GRAFANA_URL}/api/datasources/uid/${DS_UID}")

                if [ "${DS_STATUS}" = "200" ]; then
                  echo "Datasource '${DS_NAME}' (${DS_UID}) already exists in org '${ORG_NAME}' (id=${ORG_ID}) — skipping."
                  return 0
                fi

                RESULT=$(curl -s -w "\n%{http_code}" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  -H "X-Grafana-Org-Id: ${ORG_ID}" \
                  -H "Content-Type: application/json" \
                  -X POST "${GRAFANA_URL}/api/datasources" \
                  -d "{\"name\":\"${DS_NAME}\",\"uid\":\"${DS_UID}\",\"type\":\"${DS_TYPE}\",\"url\":\"${DS_URL}\",\"access\":\"proxy\",\"isDefault\":${DS_DEFAULT}}")
                HTTP_CODE=$(echo "$RESULT" | tail -1)
                BODY=$(echo "$RESULT" | head -1)
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                  echo "Created datasource '${DS_NAME}' (${DS_UID}) in org '${ORG_NAME}' (id=${ORG_ID})."
                else
                  echo "ERROR creating datasource '${DS_NAME}' (${DS_UID}) in org '${ORG_NAME}' (id=${ORG_ID}) (HTTP ${HTTP_CODE}): ${BODY}"
                  return 0
                fi
              }

              for ORG in Assembly Access Application Cloud Conversion; do
                ORG_JSON=$(curl -s -u "${ADMIN_USER}:${ADMIN_PASS}" "${GRAFANA_URL}/api/orgs/name/${ORG}")
                ORG_ID=$(echo "${ORG_JSON}" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*\([0-9]\+\).*/\1/p')
                if [ -z "${ORG_ID}" ]; then
                  echo "ERROR: Could not resolve org id for '${ORG}'. Response: ${ORG_JSON}"
                  exit 1
                fi

                ensure_datasource "${ORG_ID}" "${ORG}" "victoria-metrics" "Victoria Metrics" "prometheus" "http://observability-central-victoria-metrics-single-server:8428" "true"
                ensure_datasource "${ORG_ID}" "${ORG}" "victoria-logs" "Victoria Logs" "victoriametrics-logs-datasource" "http://observability-central-victoria-logs-single-server:9428" "false"
              done

              echo "Mission org datasource bootstrap completed."
          volumeMounts:
            - name: grafana-admin-secret
              mountPath: /var/secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: grafana-admin-secret
          secret:
            secretName: grafana-admin
            items:
              - key: admin-user
                path: admin-user
              - key: admin-password
                path: admin-password
