# PDB for Grafana (deployment is created by kube-prometheus-stack grafana subchart with fullnameOverride: grafana).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana
  namespace: {{ .Values.namespace | default "observability" }}
  labels:
    app.kubernetes.io/name: observability-central
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
