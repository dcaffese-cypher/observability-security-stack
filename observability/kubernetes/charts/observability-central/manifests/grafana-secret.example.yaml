# Example only — do not commit real credentials. Copy to a private path, fill stringData, then:
#   kubectl apply -f grafana-secret.yaml -n observability
#
# Source: Bitwarden → Observability / Grafana OIDC Client (same client_id + client_secret as the GitHub OAuth App).
# Jira requires GF_AUTH_GENERIC_OAUTH_*; auth.github also needs GF_AUTH_GITHUB_* (same values in both pairs).
#
# Encode alternative (data: instead of stringData:):
#   echo -n 'YOUR_CLIENT_ID' | base64 -w0
#
# Verification (acceptance):
# 1. helm upgrade observability-central ... -n observability (see chart README).
# 2. kubectl rollout restart deployment grafana -n observability  (if Grafana did not pick up env).
# 3. Open https://grafana.yourdomain.tld → Sign in with GitHub.
# 4. User in org YOUR_GITHUB_ORG + team assembly → role Admin; others in org → Viewer (per role_attribute_path in values.yaml).
# 5. kubectl logs -n observability deploy/grafana --tail=100  (no OAuth misconfig errors on login attempt).
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: observability
type: Opaque
stringData:
  GF_AUTH_GITHUB_CLIENT_ID: "REPLACE_WITH_BITWARDEN_CLIENT_ID"
  GF_AUTH_GITHUB_CLIENT_SECRET: "REPLACE_WITH_BITWARDEN_CLIENT_SECRET"
