global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']

  # SNMP: start stack with `docker compose --profile snmp up -d`, add snmp/snmp.yml, then append
  # scrape jobs (see prometheus-scrape-snmp.example.yml in this directory).

rule_files:
  - /etc/prometheus/rules/*.yml
